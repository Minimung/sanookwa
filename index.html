<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>jackpot for you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --maroon: #2b0e14;
    --maroon-deep: #1c0710;
    --red: #b5232f;
    --gold: #f0c04a;
    --gold-deep: #c99a2e;
    --cream: #fbeecb;
    --green-felt: #133a2b;
    --shadow: rgba(0,0,0,0.55);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0; height:100%;
    background: radial-gradient(circle at 50% 0%, #3a1420 0%, var(--maroon-deep) 65%);
    font-family: 'Nunito', sans-serif;
    color: var(--cream);
    overflow-x: hidden;
  }

  .stage{
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  /* ---------- MACHINE CABINET ---------- */
  .machine{
    position: relative;
    width: 100%;
    max-width: 380px;
    background: linear-gradient(180deg, #7a1420, var(--maroon));
    border-radius: 22px;
    padding: 22px 20px 30px;
    box-shadow: 0 30px 70px var(--shadow), 0 0 0 3px #4d0f18 inset, 0 0 0 6px var(--gold-deep) inset;
    text-align: center;
  }

  .bulbs{
    position: absolute;
    inset: 8px;
    border-radius: 16px;
    pointer-events: none;
  }
  .bulb{
    position: absolute;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 6px 2px rgba(240,192,74,0.8);
    animation: blink 1.4s infinite;
  }
  @keyframes blink{
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }

  .marquee{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 4px 0 14px;
    text-shadow: 0 0 8px rgba(240,192,74,0.5);
  }

  /* ---------- REEL WINDOW ---------- */
  .reel-window{
    background: linear-gradient(180deg, #0d0d0d, #1c1c1c);
    border-radius: 12px;
    padding: 16px 10px;
    box-shadow: 0 0 0 3px var(--gold-deep), inset 0 6px 14px rgba(0,0,0,0.6);
    margin-bottom: 18px;
  }

  .reels{
    display: flex;
    justify-content: center;
    gap: 8px;
  }

  .reel{
    width: 68px;
    height: 78px;
    background: linear-gradient(180deg, #fdf6e3, #f3e2b0);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 34px;
    color: var(--red);
    box-shadow: inset 0 2px 4px rgba(255,255,255,0.6), 0 4px 6px rgba(0,0,0,0.4);
    overflow: hidden;
    position: relative;
  }
  .reel.spin span{
    animation: spin-blur 0.15s linear infinite;
  }
  @keyframes spin-blur{
    0%{ transform: translateY(0); filter: blur(0px); }
    50%{ transform: translateY(6px); filter: blur(2px); }
    100%{ transform: translateY(0); filter: blur(0px); }
  }

  .title-line{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--cream);
    margin: 4px 0 4px;
  }

  .sub-line{
    font-size: 13px;
    color: rgba(251,238,203,0.75);
    margin: 0 0 18px;
    line-height: 1.5;
  }

  /* ---------- INPUT / LEVER ---------- */
  .play-row{
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4px;
  }

  .reel-input{
    padding: 0;
    background: linear-gradient(180deg, #fdf6e3, #f3e2b0);
  }
  input.coin-slot{
    width: 100%;
    height: 100%;
    text-align: center;
    font-family: 'Fraunces', serif;
    font-size: 34px;
    font-weight: 600;
    color: var(--red);
    background: transparent;
    border: none;
    outline: none;
  }
  input.coin-slot.shake{
    animation: shake 0.4s;
  }
  @keyframes shake{
    0%,100%{ transform: translateX(0); }
    25%{ transform: translateX(-6px); }
    75%{ transform: translateX(6px); }
  }

  .pull-btn{
    padding: 15px 22px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(180deg, #d94b4b, var(--red));
    color: var(--cream);
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 5px 0 #7a1414, 0 8px 16px rgba(0,0,0,0.4);
    transition: transform 0.1s;
  }
  .pull-btn:active{
    transform: translateY(4px);
    box-shadow: 0 1px 0 #7a1414;
  }

  .error-msg{
    min-height: 18px;
    font-size: 13px;
    color: #ffb4b4;
    margin-top: 14px;
  }

  /* ---------- PHOTO POPUP MODAL ---------- */
  .modal-overlay{
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,3,6,0.85);
    z-index: 50;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show{
    display: flex;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn{
    from{ opacity: 0; } to{ opacity: 1; }
  }

  .modal-card{
    background: linear-gradient(180deg, #3a1420, var(--maroon-deep));
    border-radius: 18px;
    padding: 22px;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 0 0 3px var(--gold-deep), 0 30px 70px var(--shadow);
    text-align: center;
    max-height: 90vh;
    overflow-y: auto;
  }

  .jackpot-text{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 20px;
    color: var(--gold);
    margin: 0 0 14px;
    text-shadow: 0 0 10px rgba(240,192,74,0.6);
  }

  .photo-stack{
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 18px;
  }
  .photo-stack img{
    width: 100%;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    display: block;
  }

  .close-btn{
    padding: 12px 26px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(180deg, var(--gold), var(--gold-deep));
    color: var(--maroon-deep);
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 4px 0 #9c7420;
    transition: transform 0.1s;
  }
  .close-btn:active{
    transform: translateY(3px);
    box-shadow: 0 1px 0 #9c7420;
  }

  @keyframes unfold{
    from{ opacity:0; transform: translateY(8px) scale(0.98); }
    to{ opacity:1; transform: translateY(0) scale(1); }
  }

  .footer{
    display: none;
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px dashed rgba(240,192,74,0.3);
    text-align: center;
  }
  .footer.show{
    display: block;
    animation: unfold 0.7s ease 0.15s both;
  }
  .footer img{
    width: 100%;
    max-width: 220px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    margin-bottom: 10px;
  }
  .footer-text{
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 10px;
    color: var(--gold);
    margin: 0;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="machine" id="machine">
    <div class="bulbs" id="bulbs"></div>

    <!-- LOCK / SLOT VIEW -->
    <div id="lockView">
      <p class="marquee">✦ your lucky number  ✦</p>

      <div class="reel-window">
        <div class="reels" id="reels">
          <div class="reel"><span>7</span></div>
          <div class="reel"><span>7</span></div>
          <div class="reel reel-input">
            <input type="text" class="coin-slot" id="digitInput" maxlength="1" inputmode="numeric" autocomplete="off" />
          </div>
        </div>
      </div>

      <p class="title-line">CEO please answer this qestion</p>
      

      <div class="play-row">
        <button class="pull-btn" id="unlockBtn">PULL</button>
      </div>
      <div class="error-msg" id="errorMsg"></div>
    </div>


    <!-- FOOTER (revealed after photo popup closes) -->
    <div class="footer" id="footerView">
      <img src="cat2.jpg" alt="cute cat meme" />
      <p class="footer-text">From TEE R </p>
      <p>wan nee tam ngan bab pwasitive energy krai stupid go away K K K</p>
    </div>
  </div>
</div>

<!-- PHOTO POPUP MODAL -->
<div class="modal-overlay" id="photoModal">
  <div class="modal-card">
    <p class="jackpot-text">🎉🎉ถูกกต้องงงงง🎉🎉</p>
    <div class="photo-stack">
      <img src="cat1.jpg" alt="cute cat meme" />
    </div>
    <button class="close-btn" id="closeModalBtn">กดๆๆๆ</button>
  </div>
</div>

<script>
  // ambient blinking bulbs around the cabinet edge
  const bulbsEl = document.getElementById('bulbs');
  const bulbCount = 26;
  for(let i=0;i<bulbCount;i++){
    const b = document.createElement('div');
    b.className = 'bulb';
    const t = i / bulbCount;
    const angle = t * Math.PI * 2;
    const rx = 48, ry = 48;
    const cx = 50, cy = 50;
    // place around a rounded rectangle perimeter approx using ellipse math for simplicity
    const x = cx + rx * Math.cos(angle);
    const y = cy + ry * Math.sin(angle);
    b.style.left = x + '%';
    b.style.top = y + '%';
    b.style.animationDelay = (i % 2 === 0 ? 0 : 0.7) + 's';
    bulbsEl.appendChild(b);
  }

  const digitInput = document.getElementById('digitInput');
  const unlockBtn = document.getElementById('unlockBtn');
  const errorMsg = document.getElementById('errorMsg');
  const lockView = document.getElementById('lockView');
  const footerView = document.getElementById('footerView');
  const reelsEl = document.querySelectorAll('.reel');
  const photoModal = document.getElementById('photoModal');
  const closeModalBtn = document.getElementById('closeModalBtn');

  const ANSWER = "7";

  function tryUnlock(){
    const val = digitInput.value.trim();
    if(val === ANSWER){
      errorMsg.textContent = '';
      reelsEl.forEach(r => r.classList.add('spin'));
      setTimeout(() => {
        reelsEl.forEach(r => r.classList.remove('spin'));
        photoModal.classList.add('show');
      }, 650);
    } else {
      digitInput.classList.remove('shake');
      void digitInput.offsetWidth;
      digitInput.classList.add('shake');
      errorMsg.textContent = 'ผิดดด ทำไมยูไม่รู้';
      digitInput.value = '';
      digitInput.focus();
    }
  }

  unlockBtn.addEventListener('click', tryUnlock);
  digitInput.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter') tryUnlock();
  });

  closeModalBtn.addEventListener('click', () => {
    photoModal.classList.remove('show');
    lockView.style.display = 'none';
    footerView.classList.add('show');
  });

  digitInput.focus();
</script>

</body>
</html>
